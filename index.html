<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkit2me</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000000; }
        canvas { width: 100%; height: 100%; outline: none; }
        #loading { color: white; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="loading">جاري تحميل التطبيق...</div>
    <canvas id="ComposeTarget"></canvas>

    <script src="skiko.js"></script>
    <script src="linkit2me.js"></script>

    <script>
        // إخفاء رسالة التحميل بعد ثوانٍ من التشغيل
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loading');
                if (loader) loader.style.display = 'none';
            }, 3000);
        });
    </script>
</body>
</html>
