<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First_my_app | Link2mem</title>
    <style>
        /* إعدادات الشاشة لضمان ظهور التطبيق بالكامل */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #1a1a1a; /* لون غامق مريح للعين أثناء التحميل */
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
            outline: none;
        }
        /* رسالة بسيطة تظهر فقط إذا تأخر التحميل */
        #loading-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="loading-text">جاري تحميل التطبيق...</div>
    
    <canvas id="ComposeTarget"></canvas>

    <script src="skiko.js"></script>
    <script src="linkit2me.js"></script>

    <script>
        // إخفاء نص التحميل بمجرد بدء تشغيل البرنامج
        window.onload = function() {
            const loading = document.getElementById('loading-text');
            if (loading) {
                setTimeout(() => loading.style.display = 'none', 1000);
            }
        };
    </script>
</body>
</html>
